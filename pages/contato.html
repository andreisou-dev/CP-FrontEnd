<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | TripWay</title>
</head>

<body>

    <header>
        <nav>
            <a href="../index.html">TripWay</a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="destinos.html">Destinos</a></li>
                <li><a href="pacotes.html">Pacotes</a></li>
                <li><a href="contato.html">Contato / Reserva</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <header>
            <h1>Contatos / Reserva:</h1>
        </header>
 
        <section>
            <form>
                <div>
                    <label for="name">Nome</label>
                    <input type="text" id="name" placeholder="Ex: Luiz Felipe" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ex: Fiap@gmail.com" required>

                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" placeholder="Mande sua mensagem..." required></textarea>
                </div>

                <div>

                    <label for="destino">Destino de interesse</label>
                    <select id="destino">
                        <option value="sp">São Paulo</option>
                        <option value="rj">Rio de Janeiro</option>
                        <option value="ba">Bahia</option>
                    </select>

                    <label for="qtd">Quantidade de pessoas</label>
                    <input type="number" id="qtd" required>

                    <label for="date1">Data de ida</label>
                    <input type="date" id="date1">

                    <label for="date2">Data de volta</label>
                    <input type="date" id="date2" required>
                </div>
 
                <button type="submit">Enviar</button>

             </form>
        </section>


    </main>

    <footer>
        <p>2026 TripWay</p>
    </footer>

</body>

</html>
